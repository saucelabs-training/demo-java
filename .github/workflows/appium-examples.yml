name: Appium Examples

on:
  schedule:
    - cron: '35 20 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '**/appium/**'
  pull_request:
    paths:
      - '**/appium/**'

env:
  SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
  SAUCE_ACCESS_KEY: ${{ secrets.SAUCE_ACCESS_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cloud: [ RDC, VDC ]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: "temurin"
      - name: Android Native App ${{ matrix.cloud }}
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: cd ./appium/android-app && mvn test -Dsauce.cloud=${{ matrix.cloud }}
