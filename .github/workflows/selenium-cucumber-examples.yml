name: Selenium Cucumber Tests

on:
  schedule:
    - cron: '35 19 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '**/selenium-cucumber-examples/**'
      - 'pom.*'
  pull_request:
    paths:
      - '**/selenium-cucumber-examples/**'
      - 'pom.*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
    env:
      SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
      SAUCE_ACCESS_KEY: ${{ secrets.SAUCE_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: "temurin"
      - name: Run tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: cd ./selenium-cucumber-examples && mvn test
